name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - master

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tag enumeration)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release exists for every v* tag
        shell: bash
        run: |
          for tag in $(git tag -l 'v*' | sort -V); do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "skip  $tag (release already exists)"
              continue
            fi
            echo "create $tag"
            git archive --format=zip       --output="opencode-moa-$tag.zip"     "$tag"
            git archive --format=tar.gz    --output="opencode-moa-$tag.tar.gz"  "$tag"
            gh release create "$tag" \
              --generate-notes \
              --title "$tag" \
              "opencode-moa-$tag.zip" \
              "opencode-moa-$tag.tar.gz"
          done
