name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release archive (no .git, no ignored files)
        run: |
          git archive --format=zip --output=opencode-moa-${GITHUB_REF_NAME}.zip HEAD
          git archive --format=tar.gz --output=opencode-moa-${GITHUB_REF_NAME}.tar.gz HEAD

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            opencode-moa-${{ github.ref_name }}.zip
            opencode-moa-${{ github.ref_name }}.tar.gz
